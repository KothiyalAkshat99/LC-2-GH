name: Daily LeetCode Sync

on:
  schedule:
    # Runs at 19:30 UTC daily (1:00 AM IST)
    - cron: "30 19 * * *"
  # Allows you to run the workflow manually from the "Actions" tab on GitHub
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r historical-scraper/requirements.txt
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Run Scraper
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN }}
          GITHUB_ID: ${{ secrets.GITHUB_ID }}
        # Runs the scraper pointing to your target repo
        run: python historical-scraper/main.py --repo Github-Submissions
      - name: Commit and Push Cache Updates
        run: |
          git add historical-scraper/data/
          # Commit only if changes exist, preventing errors if nothing changed
          git diff-index --quiet HEAD || (git commit -m "chore: update submissions cache [skip ci]" && git push)
